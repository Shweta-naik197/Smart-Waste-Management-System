<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Error')}"></head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <!-- Shared Navigation -->
    <nav th:replace="~{fragments :: navbar}"></nav>

    <!-- Main Content Container -->
    <div class="container my-auto py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8 text-center">
                <div class="glass-card p-5 bg-white border border-light shadow-lg">
                    <div class="rounded-circle bg-danger text-white d-inline-flex align-items-center justify-content-center fs-1 mb-4" style="width: 80px; height: 80px;">
                        <i class="bi bi-exclamation-octagon-fill"></i>
                    </div>
                    <h1 class="fw-bold mb-2 text-danger">Something Went Wrong</h1>
                    <p class="text-muted mb-4 fs-5" th:text="${errorMessage != null ? errorMessage : 'An unexpected exception occurred while processing your request.'}">Error Details</p>
                    
                    <div class="d-flex justify-content-center gap-3">
                        <a th:href="@{/}" class="btn btn-success rounded-pill px-4 py-2">
                            <i class="bi bi-house-fill me-2"></i>Go to Home
                        </a>
                        <a href="javascript:history.back()" class="btn btn-outline-secondary rounded-pill px-4 py-2">
                            <i class="bi bi-arrow-left me-2"></i>Go Back
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer th:replace="~{fragments :: footer}"></footer>

</body>
</html>
