# Application Name
spring.application.name=smartwaste

# Server Port
server.port=9093

# Database Configuration (XAMPP MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/smart_waste_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Custom property for image uploads path (relative to project root)
# In production it can be changed to an absolute path.
upload.path=uploads
