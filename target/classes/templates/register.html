<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Register')}"></head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <!-- Shared Navigation -->
    <nav th:replace="~{fragments :: navbar}"></nav>

    <!-- Main Content Container -->
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-10">

                <div class="glass-card p-5 bg-white border border-light shadow-lg">
                    <div class="text-center mb-4">
                        <div class="rounded-circle bg-success text-white d-inline-flex align-items-center justify-content-center fs-2 mb-3" style="width: 70px; height: 70px;">
                            <i class="bi bi-person-plus-fill"></i>
                        </div>
                        <h2 class="fw-bold mb-1">Citizen Registration</h2>
                        <p class="text-muted">Create your account to immediately report and track roadside waste</p>
                    </div>

                    <!-- Error Alert -->
                    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show rounded-3 mb-4 animate-fade-in" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMessage}">Error Message</span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <!-- Registration Form -->
                    <form th:action="@{/register}" th:object="${registerDto}" method="post" id="registerForm">
                        <div class="row g-3">
                            
                            <!-- Full Name -->
                            <div class="col-12">
                                <label for="name" class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="name" th:field="*{name}" placeholder="John Doe">
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Name error</div>
                            </div>

                            <!-- Email Address -->
                            <div class="col-md-6">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="email" th:field="*{email}" placeholder="john@example.com">
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Email error</div>
                            </div>

                            <!-- Phone Number -->
                            <div class="col-md-6">
                                <label for="phone" class="form-label">Phone Number</label>
                                <input type="text" class="form-control" id="phone" th:field="*{phone}" placeholder="9876543210">
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}">Phone error</div>
                            </div>

                            <!-- Physical Address -->
                            <div class="col-12">
                                <label for="address" class="form-label">Physical Address</label>
                                <textarea class="form-control" id="address" th:field="*{address}" rows="2" placeholder="Enter residential address details..."></textarea>
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('address')}" th:errors="*{address}">Address error</div>
                            </div>

                            <!-- Password -->
                            <div class="col-md-6">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" th:field="*{password}" placeholder="At least 6 characters">
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Password error</div>
                            </div>

                            <!-- Confirm Password -->
                            <div class="col-md-6">
                                <label for="confirmPassword" class="form-label">Confirm Password</label>
                                <input type="password" class="form-control" id="confirmPassword" th:field="*{confirmPassword}" placeholder="Repeat password">
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}">Confirmation error</div>
                            </div>

                            <!-- Submit Button -->
                            <div class="col-12 mt-4">
                                <button type="submit" class="btn btn-success w-100 rounded-pill py-3 fw-bold shadow-sm">
                                    <i class="bi bi-check-circle me-2"></i>Create Account
                                </button>
                            </div>
                        </div>
                    </form>

                    <!-- Login Redirect -->
                    <div class="text-center mt-4">
                        <span class="text-muted">Already have an account?</span>
                        <a th:href="@{/login}" class="text-success fw-bold text-decoration-none ms-1">Sign In Here</a>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer th:replace="~{fragments :: footer}"></footer>

</body>
</html>
